    <title>ICTV</title>
    <style>
      button:focus, button:focus-visible {
        outline: none !important;
      }
      *:focus {
        outline: none !important;
      }
    </style>
    <script type="module" crossorigin src="/Dom-Nei/assets/index-DmbnYcdc.js"></script>
    <link rel="stylesheet" crossorigin href="/Dom-Nei/assets/index-CWSSFC7l.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('keydown', e => {
        if (e.key === 'Tab' ||
            (e.ctrlKey && e.key === 'u') || 
            (e.ctrlKey && e.key === 's') ||
            (e.ctrlKey && e.shiftKey && e.key === 'I')) {
          e.preventDefault();
        }
      });
      document.oncontextmenu = () => false;
    </script>
  </body>
